<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lion Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0A0A0A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 18vw, 220px);
      line-height: 0.88;
      letter-spacing: -2px;
      color: #F7F4EE;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.3s;
      position: relative;
      z-index: 1;
    }

    h1 span {
      color: #C9A84C;
      display: block;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <h1>LION<span>STORE</span></h1>

  <!-- Zoom Contact Center — SDK base -->
  <script type="module"
    src="https://us01ccistatic.zoom.us/us01cci/web-sdk/zcc-sdk.js"
    data-apikey="WnXR2U_jSuKfb13ggmSnvQ"
    data-env="us01">
  </script>

</body>
</html>
